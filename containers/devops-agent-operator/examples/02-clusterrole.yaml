apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: devops-agent-operator
  labels:
    app.kubernetes.io/name: devops-agent-operator
    app.kubernetes.io/component: operator
rules:
  # Pod watching and patching (for marking processed)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "patch"]
  # Pod logs collection
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
  # Events collection and creation (for leader election)
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch", "create", "patch"]
  # Node information (for SSM instance ID lookup)
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  # Job watching
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch"]
  # Leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

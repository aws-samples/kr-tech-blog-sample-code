apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: ai-inference
  labels:
    app: vllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      nodeSelector:
        node-type: gpu-inference
      enableServiceLinks: false
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.17.1
          args:
            - "--model"
            - "Qwen/Qwen3-8B"
            - "--served-model-name"
            - "qwen3-8b"
            - "--max-model-len"
            - "4096"
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
          resources:
            requests:
              cpu: "4"
              memory: "16Gi"
              nvidia.com/gpu: "1"
            limits:
              nvidia.com/gpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: vllm
  namespace: ai-inference
spec:
  selector:
    app: vllm
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
  type: ClusterIP

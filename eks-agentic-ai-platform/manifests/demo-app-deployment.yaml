apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-app-config
  namespace: default
data:
  BIFROST_ENDPOINT: "http://bifrost.ai-inference.svc.cluster.local:8080/v1"
  BIFROST_API_KEY: "test-1234"
  LANGFUSE_HOST: "http://langfuse-web.observability.svc.cluster.local:3000"
  # Bifrost provider/model 형식 — simple은 vLLM, complex는 Bedrock으로 라우팅
  MODEL_SIMPLE: "self-hosted-vllm/qwen3-8b"
  MODEL_COMPLEX: "bedrock/global.anthropic.claude-haiku-4-5-20251001-v1:0"
  MODEL_DOCUMENT: "self-hosted-vllm/qwen3-8b"
  MODEL_CLASSIFIER: "self-hosted-vllm/qwen3-8b"
  MODEL_EVALUATOR: "self-hosted-vllm/qwen3-8b"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: default
  labels:
    app: demo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
        - name: demo-app
          image: <AWS_ACCOUNT_ID>.dkr.ecr.ap-northeast-2.amazonaws.com/demo-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: demo-app-config
          env:
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-keys
                  key: secret-key
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-keys
                  key: public-key
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: demo-app
  namespace: default
spec:
  selector:
    app: demo-app
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
